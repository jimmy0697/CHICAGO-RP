name: compile

on: [push]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download pawncc 3.10.10
        run: |
          wget -q https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-linux.tar.gz
          tar -xzf pawnc-3.10.10-linux.tar.gz

      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/pawn-lang/samp-stdlib.git deps/samp-stdlib
          git clone --depth 1 https://github.com/pawn-lang/compiler.git deps/pawn-compiler

          # a_mysql.inc n'existe pas dans le depot git (fichier .in genere
          # uniquement lors des releases) : on telecharge la release Linux.
          echo "Liste de tous les fichiers disponibles dans la derniere release MySQL :"
          curl -s https://api.github.com/repos/pBlueG/SA-MP-MySQL/releases/latest | jq -r '.assets[].browser_download_url'
          MYSQL_URL=$(curl -s https://api.github.com/repos/pBlueG/SA-MP-MySQL/releases/latest | jq -r '.assets[].browser_download_url' | grep -iE 'debian|linux' | grep -viE 'win|exe' | head -n1)
          echo "MySQL URL trouvee : $MYSQL_URL"
          if [ -z "$MYSQL_URL" ]; then
            echo "ERREUR: impossible de trouver l'URL de la release MySQL"
            exit 1
          fi
          mkdir -p deps/mysql
          wget -q "$MYSQL_URL" -O mysql.tar.gz
          tar --strip-components=1 -xzf mysql.tar.gz -C deps/mysql
          git clone --depth 1 https://github.com/Y-Less/SAMP-foreach.git deps/foreach
          git clone --depth 1 https://github.com/Y-Less/sscanf.git deps/sscanf
          git clone --depth 1 https://github.com/samp-incognito/samp-streamer-plugin.git deps/streamer
          git clone --depth 1 https://github.com/katursis/Pawn.CMD.git deps/pawncmd
          git clone --depth 1 https://github.com/AmyrAhmady/sampvoice.git deps/sampvoice
          git clone --depth 1 https://github.com/alextwothousand/mSelection.git deps/mselection
          git clone --depth 1 https://github.com/emmet-jones/New-SA-MP-callbacks.git deps/callbacks
          git clone --depth 1 https://github.com/oscar-broman/SKY.git deps/sky
          git clone --depth 1 https://github.com/oscar-broman/samp-weapon-config.git deps/weaponconfig
          sed -i '1i #define SAMP_CONST_CORRECT' deps/weaponconfig/weapon-config.inc
          echo "=== Recherche du coupable exact desequilibre accolades ==="
          cat > /tmp/find_culprit.py << 'CULPRIT_EOF'
          import re
          all_lines = open('gamemodes/CRP.pwn', encoding='utf-8', errors='replace').readlines()
          depth = 0
          in_comment = False
          func_pattern = re.compile(r'^\s*(public|forward|stock)\s+\w')
          last_func_line = 0
          last_func_name = ''
          last_func_depth = 0
          for i, line in enumerate(all_lines[:18650], start=1):
              if func_pattern.match(line) and depth == 0:
                  last_func_line = i
                  last_func_name = line.strip()[:60]
                  last_func_depth = depth
              j = 0
              while j < len(line):
                  c = line[j]
                  nxt = line[j+1] if j+1 < len(line) else ''
                  if in_comment:
                      if c == '*' and nxt == '/':
                          in_comment = False
                          j += 1
                  elif c == '/' and nxt == '/':
                      break
                  elif c == '/' and nxt == '*':
                      in_comment = True
                      j += 1
                  elif c == chr(34):
                      j += 1
                      while j < len(line) and line[j] != chr(34):
                          if line[j] == chr(92):
                              j += 1
                          j += 1
                  elif c == chr(39):
                      j += 1
                      while j < len(line) and line[j] != chr(39):
                          if line[j] == chr(92):
                              j += 1
                          j += 1
                  elif c == '{':
                      depth += 1
                  elif c == '}':
                      depth -= 1
                      if depth == 0 and last_func_line > 0:
                          print(f'Fonction fermee OK: ligne {last_func_line}: {last_func_name}')
                          last_func_line = 0
                  j += 1
          print()
          print('=== ETAT FINAL a la ligne 18650 ===')
          print('Profondeur:', depth)
          if last_func_line > 0:
              print(f'>>> COUPABLE PROBABLE: la fonction demarree ligne {last_func_line} ne sest jamais refermee avant la ligne 18650')
              print(f'>>> Contenu: {last_func_name}')
          CULPRIT_EOF
          python3 /tmp/find_culprit.py | tail -60
          echo ""
          echo "=== Verification equilibre accolades avant ligne 18650 ==="
          cat > /tmp/check_braces.py << 'BRACE_EOF'
          lines = open('gamemodes/CRP.pwn', encoding='utf-8', errors='replace').readlines()
          depth = 0
          in_string = False
          in_comment = False
          for i, line in enumerate(lines[:18650], start=1):
              j = 0
              while j < len(line):
                  c = line[j]
                  nxt = line[j+1] if j+1 < len(line) else ''
                  if in_comment:
                      if c == '*' and nxt == '/':
                          in_comment = False
                          j += 1
                  elif c == '/' and nxt == '/':
                      break
                  elif c == '/' and nxt == '*':
                      in_comment = True
                      j += 1
                  elif c == chr(34):
                      j += 1
                      while j < len(line) and line[j] != chr(34):
                          if line[j] == chr(92):
                              j += 1
                          j += 1
                  elif c == '{':
                      depth += 1
                  elif c == '}':
                      depth -= 1
                      if depth < 0:
                          print('ACCOLADE EN TROP a la ligne', i, ': depth negatif')
                  j += 1
          print('Profondeur accolades apres ligne 18650 (approximatif, sans macros):', depth)
          print('Si different de 0, il y a un desequilibre quelque part avant.')
          BRACE_EOF
          python3 /tmp/check_braces.py
          echo ""
          echo "=== Recherche de macros suspectes error/query/callback/handle ==="
          grep -rn "#define error\|#define query\|#define callback\|#define errorid\|#define handle\|#define connectionHandle" deps/ gamemodes/CRP.pwn 2>/dev/null || echo "aucune macro suspecte trouvee"
          echo ""
          echo "=== Version complete du fichier a_mysql.inc autour de OnQueryError (deja preprocesse par sed) ==="
          grep -c "forward OnQueryError" deps/mysql/pawno/include/a_mysql.inc
          echo ""
          echo "=== Toutes les lignes contenant juste OnQueryError isole (sans forward/public devant) ==="
          grep -n "OnQueryError" deps/mysql/pawno/include/*.inc 2>/dev/null
          echo ""
          echo "=== Contexte complet autour de TOUS les forward OnQueryError (avec ifdef) ==="
          grep -n -B 15 "forward OnQueryError" deps/mysql/pawno/include/a_mysql.inc
          echo ""
          echo "=== Comparaison caractere par caractere OnQueryError ==="
          cat > /tmp/compare_onqueryerror.py << 'COMPARE_EOF'
          import re
          fwd = open('deps/mysql/pawno/include/a_mysql.inc', encoding='utf-8', errors='replace').read()
          m = re.search(r'forward OnQueryError\([^;]*\);', fwd)
          fwd_line = m.group(0) if m else 'INTROUVABLE'
          pwn = open('gamemodes/CRP.pwn', encoding='utf-8', errors='replace').read()
          m2 = re.search(r'public OnQueryError\([^)]*\)', pwn)
          pub_line = m2.group(0) if m2 else 'INTROUVABLE'
          print('FORWARD:', repr(fwd_line))
          print('PUBLIC :', repr(pub_line))
          a = fwd_line.replace('forward ', '').replace('MySQL:handle', 'MySQL:X').rstrip(';')
          b = pub_line.replace('public ', '').replace('MySQL:connectionHandle', 'MySQL:X')
          print('A normalise:', repr(a))
          print('B normalise:', repr(b))
          if a == b:
              print('>>> IDENTIQUES apres normalisation du nom de parametre')
          else:
              print('>>> DIFFERENCE DETECTEE')
              for i in range(min(len(a), len(b))):
                  if a[i] != b[i]:
                      print('Premiere difference index', i, repr(a[i]), 'vs', repr(b[i]))
                      print('Contexte A:', repr(a[max(0,i-15):i+15]))
                      print('Contexte B:', repr(b[max(0,i-15):i+15]))
                      break
              if len(a) != len(b):
                  print('Longueurs differentes A=', len(a), 'B=', len(b))
          COMPARE_EOF
          python3 /tmp/compare_onqueryerror.py
          echo ""
          echo "=== Verification SAMP_CONST_CORRECT reellement applique ==="
          head -5 deps/weaponconfig/weapon-config.inc
          echo ""
          echo "=== Toutes declarations OnQueryError (forward/public/macro) dans deps + gamemodes ==="
          grep -rn "OnQueryError" deps/ gamemodes/CRP.pwn 2>/dev/null
          echo ""
          head -5 deps/weaponconfig/weapon-config.inc
          echo ""
          grep -rn "OnQueryError" deps/ gamemodes/CRP.pwn 2>/dev/null
          echo ""

      - name: Debug cache_ natives disponibles
        run: |
          echo "=== Natives cache_ dans a_mysql.inc ==="
          grep -n "native cache_" deps/mysql/pawno/include/*.inc || true
          echo ""
          echo "=== Appels cache_get_row_int / cache_get_row / cache_get_value_name_int dans CRP.pwn ==="
          grep -n "cache_get_row_int\|cache_get_row(\|cache_get_value_name_int" gamemodes/CRP.pwn || true

      - name: Ajouter wrappers de compatibilite MySQL
        run: |
          cat > deps/mysql/pawno/include/mysql_compat.inc << 'COMPAT_EOF'
          #if defined _mysql_compat_included
            #endinput
          #endif
          #define _mysql_compat_included

          stock cache_get_row_int(row, col) {
              new dest;
              cache_get_value_index_int(row, col, dest);
              return dest;
          }

          stock cache_get_row(row, col, dest[], size = sizeof dest) {
              cache_get_value_index(row, col, dest, size);
              return 1;
          }

          stock cache_get_field_content(row, const field[], dest[], connectionHandle = 1, max_len = 128) {
              new fields = cache_get_field_count();
              new name[64];
              for (new i = 0; i < fields; i++) {
                  cache_get_field_name(i, name);
                  if (!strcmp(name, field)) {
                      return cache_get_value_index(row, i, dest, max_len);
                  }
              }
              dest[0] = 0;
              return 0;
          }
          COMPAT_EOF
          sed -i "/a_mysql/a #include <mysql_compat>" gamemodes/CRP.pwn
          echo "=== Verification de l'insertion ==="
          grep -n "a_mysql\|mysql_compat" gamemodes/CRP.pwn | head -n 5

      - name: Fixes round 2 + diagnostic SampVoice et IsValidVehicle
        run: |
          # 1) Ajout de mysql_escape_string comme alias de mysql_real_escape_string
          cat >> deps/mysql/pawno/include/mysql_compat.inc << 'COMPAT_EOF'

          stock mysql_real_escape_string(const source[], destination[], connectionHandle = 1, max_len = sizeof destination) {
              return mysql_escape_string(source, destination, connectionHandle, max_len);
          }

          stock IsPlayerSpawned(playerid) {
              return GetPlayerState(playerid) == PLAYER_STATE_SPAWNED;
          }
          COMPAT_EOF
          echo "=== Contenu final de mysql_compat.inc ==="
          cat deps/mysql/pawno/include/mysql_compat.inc
          echo ""
          echo "=== Fonctions natives/stock SV_/Sv dans sampvoice ==="
          grep -rn "native Sv\|stock Sv\|#define SV_\|native SV_\|stock SV_" deps/sampvoice/server/ || true
          echo ""
          echo "=== Toutes les definitions de IsValidVehicle dans CRP.pwn ==="
          grep -n "IsValidVehicle" gamemodes/CRP.pwn || true

      - name: Fixes round 4 v3 (IsValidVehicle + floatstr + diagnostic 18650)
        run: |
          set +e

          echo "=== Avant suppression: recherche IsValidVehicle ==="
          grep -n "native[[:space:]]\+IsValidVehicle" gamemodes/CRP.pwn

          sed -i "/^[[:space:]]*native[[:space:]]\+IsValidVehicle[[:space:]]*(/d" gamemodes/CRP.pwn

          echo "=== Apres suppression: verification ==="
          grep -n "native[[:space:]]\+IsValidVehicle" gamemodes/CRP.pwn
          echo "(si rien au-dessus, la suppression a fonctionne)"
          echo ""

          cat > deps/samp-stdlib/floatstr_compat.inc << 'COMPAT_EOF'
          #if defined _floatstr_compat_included
            #endinput
          #endif
          #define _floatstr_compat_included

          #if !defined floatstr
          stock Float:floatstr(const string[]) {
              new i = 0;
              new sign = 1;
              new integer_part = 0;
              new decimal_part = 0;
              new decimal_digits = 0;

              if (string[i] == '-') { sign = -1; i++; }
              else if (string[i] == '+') { i++; }

              while (string[i] >= '0' && string[i] <= '9') {
                  integer_part = integer_part * 10 + (string[i] - '0');
                  i++;
              }

              if (string[i] == '.') {
                  i++;
                  while (string[i] >= '0' && string[i] <= '9') {
                      decimal_part = decimal_part * 10 + (string[i] - '0');
                      decimal_digits++;
                      i++;
                  }
              }

              new Float:result = float(integer_part);
              if (decimal_digits > 0) {
                  new Float:divisor = 1.0;
                  for (new d = 0; d < decimal_digits; d++) {
                      divisor *= 10.0;
                  }
                  result += float(decimal_part) / divisor;
              }

              return float(sign) * result;
          }
          #endif
          COMPAT_EOF

          sed -i "/#include <a_samp>/a #include <floatstr_compat>" gamemodes/CRP.pwn

          echo "=== Verification insertion floatstr_compat ==="
          grep -n "a_samp" gamemodes/CRP.pwn
          grep -n "floatstr_compat" gamemodes/CRP.pwn
          echo ""

          sed -n "18600,18660p" gamemodes/CRP.pwn

          set -e

      - name: Compile gamemode
        run: |
          chmod +x pawnc-3.10.10-linux/bin/pawncc
          LIBDIR=$(dirname $(find pawnc-3.10.10-linux -name "libpawnc*" | head -n1))
          export LD_LIBRARY_PATH=$LIBDIR:$LD_LIBRARY_PATH
                    echo "=== git HEAD actuel ==="
          git log -1 --format="%H %ci"
          echo ""
          echo "=== Ligne EXACTE 18650 (error 025) avec 15 lignes de contexte ==="
          awk 'NR>=18635 && NR<=18665 { if (NR==18650) print NR": >>>> " $0; else print NR": " $0 }' gamemodes/CRP.pwn
          echo ""
          echo "=== Ligne EXACTE 2101 weapon-config.inc (error 035) avec contexte ==="
          awk 'NR>=2085 && NR<=2115 { if (NR==2101) print NR": >>>> " $0; else print NR": " $0 }' deps/weaponconfig/weapon-config.inc
          echo ""
          echo ""
          echo ""
          echo ""
          echo "=== Toutes occurrences OnAdminOfflinePrison (numeros reels) ==="
          echo ""
          echo ""
          sed -i 's/DebugMessage(%1);/DebugMessage(%1) 0/' deps/weaponconfig/weapon-config.inc
          sed -i 's/DebugMessageRed(%1);/DebugMessageRed(%1) 0/' deps/weaponconfig/weapon-config.inc
          sed -i 's/DebugMessageAll(%1);/DebugMessageAll(%1) 0/' deps/weaponconfig/weapon-config.inc
          sed -i 's/DebugMessageRedAll(%1);/DebugMessageRedAll(%1) 0/' deps/weaponconfig/weapon-config.inc
          echo "=== Prototype reel OnQueryError dans les deps ==="
          grep -rn "OnQueryError" deps/ 2>/dev/null | grep -iv "gamemodes" || echo "aucune reference trouvee"
          echo ""
          echo "=== Prototype reel ApplyAnimation (native) dans les deps ==="
          grep -rn "native ApplyAnimation" deps/ 2>/dev/null || echo "aucune reference trouvee dans deps/"
          find / -iname "a_samp.inc" 2>/dev/null | while read f; do echo "--- $f ---"; grep -n "ApplyAnimation" "$f"; done
          echo ""
          ./pawnc-3.10.10-linux/bin/pawncc gamemodes/CRP.pwn \
            -i./deps/pawn-compiler/include \
            -i./deps/samp-stdlib \
            -i./deps/mysql/pawno/include \
            -i./deps/foreach \
            -i./deps/sscanf \
            -i./deps/sscanf/include \
            -i./deps/streamer \
            -i./deps/streamer/include \
            -i./deps/pawncmd/src \
            -i./deps/sampvoice/server \
            -i./deps/mselection \
            -i./deps/callbacks \
            -i./deps/sky \
            -i./deps/sky/include \
            -i./deps/weaponconfig \
            -i./include \
            -o./gamemodes/CRP.amx \
            -d3 -Z+

      - name: Upload compiled .amx
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CRP-compiled
          path: gamemodes/CRP.amx
