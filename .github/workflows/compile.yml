name: compile
on: [push]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download pawncc 3.10.10
        run: |
          wget -q https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-linux.tar.gz
          tar -xzf pawnc-3.10.10-linux.tar.gz      - name: Patch weapon-config.inc
      - name: Patch weapon-config.inc  
        run: |
          python3 -c "
           import re
           with open('deps/weaponconfig/weapon-config.inc', 'r') as f:
           content = f.read()
           content = re.sub(r'^[ \t]*;[ \t]*\n', '', content, flags=re.MULTILINE)
           content = re.sub(r'SetPlayerHealth\(([^,]+),\s*(\d+)\)', r'SetPlayerHealth(\1, Float:\2)', content)
           content = re.sub(r'SetPlayerArmour\(([^,]+),\s*(\d+)\)', r'SetPlayerArmour(\1, Float:\2)', content)
           with open('deps/weaponconfig/weapon-config.inc', 'w') as f:
           f.write(content)
          print('Patch OK')
      - name: Compile gamemode
        run: |
          chmod +x pawnc-3.10.10-linux/bin/pawncc
          LIBDIR=$(dirname $(find pawnc-3.10.10-linux -name "libpawnc*" | head -n1))
          export LD_LIBRARY_PATH=$LIBDIR:$LD_LIBRARY_PATH
          ./pawnc-3.10.10-linux/bin/pawncc gamemodes/CRP.pwn \
            -i./deps/pawn-compiler/include \
            -i./deps/samp-stdlib \
            -i./deps/mysql/pawno/include \
            -i./deps/sscanf \
            -i./deps/sscanf/include \
            -i./deps/streamer \
            -i./deps/streamer/include \
            -i./deps/pawncmd/src \
            -i./deps/sampvoice/server \
            -i./deps/mselection \
            -i./deps/callbacks \
            -i./deps/sky \
            -i./deps/sky/include \
            -i./deps/weaponconfig \
            -i./include \
            -o./gamemodes/CRP.amx \
            -d3 -Z-
      - name: Upload compiled .amx
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CRP-compiled
          path: gamemodes/CRP.amx
